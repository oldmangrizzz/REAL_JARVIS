<VirtualHost *:80>
    ServerName cloud.grizzlymedicine.icu
    DocumentRoot /var/nextcloud

    <Directory /var/nextcloud>
        Require all granted
        AllowOverride All
        Options FollowSymLinks MultiViews

        <IfModule mod_dav.c>
            Dav Off
        </IfModule>
    </Directory>

    ErrorLog /var/log/apache2/nextcloud_error.log
    CustomLog /var/log/apache2/nextcloud_access.log combined
</VirtualHost>
