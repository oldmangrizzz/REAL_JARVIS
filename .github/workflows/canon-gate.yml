name: canon-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  non-dom-invariant:
    name: Non-DOM invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid WebView / DOM shims in platform apps
        run: |
          set -e
          BANNED='WKWebView|UIWebView|loadHTMLString|innerHTML|document\.createElement|WebKitView'
          HITS=$(grep -REn --include='*.swift' "$BANNED" Jarvis/Mac Jarvis/Mobile Jarvis/Watch Jarvis/TV Jarvis/Shared 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "::error::Non-DOM invariant violated. DOM/WebView APIs are banned from Jarvis platform apps."
            echo "$HITS"
            exit 1
          fi
          echo "Non-DOM invariant upheld."

  canon-tests:
    name: JarvisCore canon tests (xcodebuild)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Run JarvisCore test suite
        run: |
          set -o pipefail
          xcodebuild \
            -workspace jarvis.xcworkspace \
            -scheme Jarvis \
            -destination 'platform=macOS' \
            test 2>&1 | tee xcodebuild.log
      - name: Enforce canon floor
        run: |
          # Floor: at least 182 tests must execute (SPEC-004/007/008/009 +
          # destructive-intent guard + tunnel identity + companion tier +
          # principal-witnessed telemetry + adversarial canon). Floor rises
          # as new canon work lands. Never decrease.
          EXECUTED=$(grep -Eo 'Executed [0-9]+ tests, with 0 failures' xcodebuild.log | tail -1 | grep -Eo '[0-9]+' | head -1)
          echo "Executed tests: $EXECUTED"
          if [ -z "$EXECUTED" ] || [ "$EXECUTED" -lt 182 ]; then
            echo "::error::Canon floor violated. Expected >= 182 tests, got $EXECUTED."
            exit 1
          fi
          echo "Canon floor upheld."
      - name: Require canon adversarial suite ran
        run: |
          # The CanonAdversarialTests suite must have executed. If it
          # didn't run, the canon gate is effectively off regardless of
          # total test count.
          if ! grep -q "Test Suite 'CanonAdversarialTests'" xcodebuild.log; then
            echo "::error::CanonAdversarialTests suite did not run."
            exit 1
          fi
          if ! grep -q "Test Suite 'CanonAdversarialTests' passed" xcodebuild.log; then
            echo "::error::CanonAdversarialTests suite did not pass."
            exit 1
          fi
          echo "Canon adversarial suite passed."
      - name: Require SPEC-007 / SPEC-008 / SPEC-009 canon tests
        run: |
          # SPEC-007 identity binding + SPEC-008 destructive guard + SPEC-009
          # companion tier policy must all have dedicated canon regressions.
          REQUIRED=(
            "testBootstrapModeRefusesVoiceOperatorWithoutIdentityProof"
            "testDestructiveGuardRefusesBurstShutdownSequence"
            "testARCBridgeRefusesEmptyGridDump"
            "testCompanionTierCannotIssueDestructiveVoiceIntent"
            "testGuestTierCannotIssueTunnelCommandsBeyondStatus"
          )
          MISSING=0
          for t in "${REQUIRED[@]}"; do
            if ! grep -q "$t" xcodebuild.log; then
              echo "::error::Missing canon test: $t"
              MISSING=1
            fi
          done
          [ "$MISSING" -eq 0 ] || exit 1
          echo "Required canon tests present."
