http:
  routers:
    nextcloud:
      rule: "Host(`cloud.grizzlymedicine.icu`)"
      service: nextcloud
      entryPoints:
        - websecure
      tls:
        certResolver: le
  services:
    nextcloud:
      loadBalancer:
        servers:
          - url: "http://192.168.4.100:80"
        healthCheck:
          path: "/status.php"
          interval: "30s"
          timeout: "10s"
          enabled: true
